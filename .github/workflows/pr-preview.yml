name: PR Live Preview

on:
  pull_request_target:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: github-pages-pr-previews
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}pr-preview/pr-${{ github.event.pull_request.number }}/

    steps:
      - name: Checkout pull request
        if: github.event.action != 'closed'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: app

      - name: Set up Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        if: github.event.action != 'closed'
        working-directory: app
        run: npm ci

      - name: Detect preview URL
        if: github.event.action != 'closed'
        id: preview-url
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const {data: pages} = await github.rest.repos.getPages({owner, repo});
            const baseUrl = pages.html_url.endsWith('/') ? pages.html_url : `${pages.html_url}/`;
            const previewUrl = new URL(`pr-preview/pr-${context.payload.pull_request.number}/`, baseUrl).toString();
            core.setOutput('url', previewUrl);

      - name: Run tests
        if: github.event.action != 'closed'
        working-directory: app
        run: npm test

      - name: Build preview
        if: github.event.action != 'closed'
        working-directory: app
        env:
          VITE_BASE_PATH: /Atlas-ChatGPT/pr-preview/pr-${{ github.event.pull_request.number }}/
        run: npm run build

      - name: Generate mobile preview QR code
        if: github.event.action != 'closed'
        working-directory: app
        env:
          PREVIEW_URL: ${{ steps.preview-url.outputs.url }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qrencode
          mkdir -p public dist/public
          qrencode --output=public/preview-qr.png --type=PNG --size=8 --margin=2 "${PREVIEW_URL}"
          cp public/preview-qr.png dist/public/preview-qr.png

      - name: Restore Pages preview store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init pages-site
          cd pages-site
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git fetch --depth=1 origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

      - name: Update preview content
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail
          preview_dir="pages-site/pr-preview/pr-${PR_NUMBER}"
          rm -rf "${preview_dir}"

          if [ "${PR_ACTION}" != "closed" ]; then
            mkdir -p "${preview_dir}"
            cp -a app/dist/. "${preview_dir}/"
          fi

          touch pages-site/.nojekyll

      - name: Persist preview store
        id: persist
        working-directory: pages-site
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            git commit -m "Update preview for PR #${{ github.event.pull_request.number }}"
            git push origin HEAD:gh-pages
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Remove Git metadata from Pages artifact
        run: rm -rf pages-site/.git

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment preview URL and mobile QR code
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deployment.outputs.page_url }}pr-preview/pr-${{ github.event.pull_request.number }}/
          QR_URL: ${{ steps.deployment.outputs.page_url }}pr-preview/pr-${{ github.event.pull_request.number }}/public/preview-qr.png?sha=${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = '<!-- atlas-pr-preview-url -->';
            const body = `${marker}\n## ✅ Preview Ready\n\nDesktop:\n${process.env.PREVIEW_URL}\n\n📱 Mobile Preview\n\nScan this QR code with your phone camera to instantly open the preview.\n\n![QR Code](${process.env.QR_URL})`;
            const {owner, repo} = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body});
            }
